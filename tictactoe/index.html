<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>NEON TAC TOE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="scanlines"></div>
<div class="crt-flicker"></div>

<div class="cabinet">

  <header class="marquee">
    <h1 class="title" data-text="NEON TAC TOE">NEON TAC TOE</h1>
    <div class="title-glow"></div>
  </header>

  <div class="control-deck">
    <div class="mode-select" role="group" aria-label="Game mode">
      <button class="mode-btn active" data-mode="pvp">2 PLAYER</button>
      <button class="mode-btn" data-mode="ai-easy">VS CPU (EASY)</button>
      <button class="mode-btn" data-mode="ai-hard">VS CPU (HARD)</button>
    </div>
    <button id="muteBtn" class="icon-btn" aria-label="Toggle sound" title="Toggle sound">🔊</button>
  </div>

  <div class="screen">
    <div id="status" class="status">PLAYER X — YOUR MOVE</div>

    <div class="board-wrap">
      <div id="board" class="board" role="grid" aria-label="Tic Tac Toe board"></div>
      <svg id="winLine" class="win-line" viewBox="0 0 300 300" preserveAspectRatio="none">
        <line id="winLinePath" x1="0" y1="0" x2="0" y2="0" />
      </svg>
    </div>

    <button id="reset" class="reset-btn">⟲ NEW ROUND</button>
  </div>

  <div class="scoreboard">
    <div class="score-card x-card">
      <span class="score-label">X WINS</span>
      <span id="xScore" class="score-value">0</span>
    </div>
    <div class="score-card draw-card">
      <span class="score-label">DRAWS</span>
      <span id="draws" class="score-value">0</span>
    </div>
    <div class="score-card o-card">
      <span class="score-label">O WINS</span>
      <span id="oScore" class="score-value">0</span>
    </div>
  </div>

  <div class="coin-slot">
    <span class="blink">INSERT COIN TO CONTINUE</span>
  </div>

</div>

<div id="confettiLayer" class="confetti-layer" aria-hidden="true"></div>

<script src="script.js"></script>
</body>
</html>
